<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPR Local — Chat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#101418;color:#eef4f8;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px 24px;border-bottom:1px solid rgba(148,163,184,.15);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.1rem;font-weight:600}
.header a{color:#8bd3ff;text-decoration:none;font-size:.82rem}
.header a:hover{text-decoration:underline}
.container{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:16px}
.messages{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.88rem;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:#8bd3ff;color:#061019;border-bottom-right-radius:2px}
.msg.assistant{align-self:flex-start;background:#1a2027;border:1px solid rgba(148,163,184,.2);border-bottom-left-radius:2px}
.msg .meta{font-size:.7rem;color:#6b7b8a;margin-top:6px}
.msg.assistant .meta{color:#9fb0bd}
.input-area{padding:16px 0;border-top:1px solid rgba(148,163,184,.15);display:flex;gap:10px}
.input-area textarea{flex:1;background:#1a2027;border:1px solid rgba(148,163,184,.3);border-radius:8px;padding:10px 14px;color:#eef4f8;font:inherit;font-size:.88rem;resize:none;min-height:44px;max-height:150px;line-height:1.4}
.input-area textarea:focus{outline:2px solid #8bd3ff;outline-offset:1px}
.input-area button{border:none;border-radius:8px;padding:0 20px;background:#8bd3ff;color:#061019;font:inherit;font-weight:600;cursor:pointer;font-size:.88rem;white-space:nowrap}
.input-area button:hover{background:#66c2ff}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
.status{font-size:.75rem;color:#9fb0bd;text-align:center;padding:8px}
.status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}
.status .dot.green{background:#4ade80}
.status .dot.red{background:#f87171}
.status .dot.yellow{background:#facc15}
</style>
</head>
<body>
<div class="header">
  <h1>• NPR Local Chat</h1>
  <a href="/config-llama.html">⚙ Config</a>
</div>
<div class="container">
  <div class="status" id="status"><span class="dot yellow"></span>Connecting...</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send" onclick="send()">→</button>
  </div>
</div>

<script>
const API = 'http://[::1]:5000/agent/chat';
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const status = document.getElementById('status');

// Persistent session
const SESSION_KEY = 'npr-chat-session';
function getOrCreateSession() {
  let sid = localStorage.getItem(SESSION_KEY);
  if (!sid) {
    sid = `sess-${Date.now()}`;
    localStorage.setItem(SESSION_KEY, sid);
  }
  return sid;
}

// Load history from geowon on init
const sessionId = getOrCreateSession();

async function loadHistory() {
  try {
    const r = await fetch(`http://[::1]:5004/session/${sessionId}`);
    if (r.ok) {
      const data = await r.json();
      if (data && data.messages) {
        for (const m of data.messages) {
          addMsg(m.role || 'assistant', m.content, '');
        }
      }
    }
  } catch(e) {
    // Geowon offline or no history yet
  }
}

loadHistory();

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});

// Send on Enter (Shift+Enter for newline)
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

let currentSSE = null;

async function send() {
  const text = input.value.trim();
  if (!text) return;
  
  addMsg('user', text);
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  
  // Create thinking indicator
  const thinkingDiv = document.createElement('div');
  thinkingDiv.className = 'msg assistant';
  thinkingDiv.innerHTML = '<span class="thinking-dots">• • •</span>';
  msgs.appendChild(thinkingDiv);
  msgs.scrollTop = msgs.scrollHeight;
  
  // Create content div (hidden until tokens arrive)
  const contentDiv = document.createElement('div');
  contentDiv.className = 'msg assistant';
  contentDiv.style.display = 'none';
  const metaSpan = document.createElement('div');
  metaSpan.className = 'meta';
  msgs.appendChild(contentDiv);
  
  let fullText = '';
  let slot = '?', model = '';
  
  try {
    const evt = new EventSourcePolyfill(API + '-stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      payload: JSON.stringify({ message: text, sessionId })
    });
    currentSSE = evt;
    
    evt.onmessage = (e) => {
      const data = JSON.parse(e.data);
      
      if (data.type === 'route') {
        slot = data.slot;
        model = data.model;
        thinkingDiv.remove();
        contentDiv.style.display = 'block';
      } else if (data.type === 'thinking') {
        // Still thinking, keep dots
      } else if (data.type === 'token') {
        if (thinkingDiv.parentNode) thinkingDiv.remove();
        contentDiv.style.display = 'block';
        fullText += data.content;
        contentDiv.textContent = fullText;
        metaSpan.textContent = `${data.tokenCount} tok | ${data.tps} tok/s | slot ${slot}`;
        msgs.scrollTop = msgs.scrollHeight;
      } else if (data.type === 'done') {
        fullText = data.content;
        contentDiv.textContent = fullText;
        metaSpan.textContent = `${data.tokenCount} tok | ${data.elapsed}s | slot ${slot} | ${model}`;
        contentDiv.appendChild(metaSpan);
        evt.close();
        status.innerHTML = '<span class="dot green"></span>Online';
      }
    };
    
    evt.onerror = () => {
      evt.close();
      thinkingDiv.remove();
      status.innerHTML = '<span class="dot red"></span>Offline';
    };
    
  } catch (e) {
    thinkingDiv.remove();
    addMsg('assistant', `Error: ${e.message}`, '');
    status.innerHTML = '<span class="dot red"></span>Offline';
  }
  
  sendBtn.disabled = false;
  input.focus();
}

// Minimal EventSource polyfill for POST
const EventSourcePolyfill = class {
  constructor(url, opts = {}) {
    this.url = url;
    this.opts = opts;
    this._timer = null;
    
    fetch(this.url, {
      method: opts.method || 'GET',
      headers: opts.headers || {},
      body: opts.payload || undefined,
    }).then(async resp => {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            this.onmessage?.({ data: line.slice(6) });
          }
        }
      }
    }).catch(() => this.onerror?.());
  }
  close() { /* cleanup */ }
};

// Initial check
(async () => {
  try {
    const r = await fetch('http://[::1]:5000/health');
    const d = await r.json();
    status.innerHTML = '<span class="dot green"></span>Online';
    addMsg('assistant', `NPR Local v${d.version || '0.0.1'} ready. Origin: ${d.origin}.`, '');
  } catch {
    status.innerHTML = '<span class="dot red"></span>Offline — check :5000';
  }
})();
</script>
</body>
</html>
