<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NPR Local — Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d8;
    --text-dim: #68688080;
    --accent: #6366f1;
    --accent-dim: #6366f140;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
  }
  .card h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border: none; }
  .stat-label { color: var(--text-dim); }
  .stat-value { color: #fff; font-weight: 500; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }

  /* Hex Grid */
  .hex-grid {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 3px;
  }
  .hex-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: #1a1a2a;
    border: 1px solid #2a2a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #4a4a6a;
    cursor: pointer;
    transition: all 0.15s;
  }
  .hex-cell:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: #fff;
  }
  .hex-cell.registered {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .hex-cell.phase-1 { border-top: 2px solid #3a3a5a; }

  /* Chart */
  .chart-container {
    height: 120px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding-top: 10px;
  }
  .chart-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    position: relative;
    transition: height 0.3s;
  }
  .chart-bar:hover {
    opacity: 0.8;
  }
  .chart-bar .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    margin-bottom: 4px;
  }
  .chart-bar:hover .tooltip { display: block; }

  /* Session list */
  .session-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    background: #0e0e16;
  }
  .session-id {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }
  .session-meta {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Tool calls */
  .tool-call {
    display: flex;
    gap: 8px;
    padding: 8px;
    border-left: 2px solid var(--accent);
    margin-bottom: 6px;
    background: #0e0e16;
    font-size: 11px;
  }
  .tool-name { color: var(--accent); font-weight: 500; min-width: 80px; }
  .tool-args { color: var(--text-dim); flex: 1; }
  .tool-time { color: var(--text-dim); font-size: 10px; }

  /* Model bar */
  .model-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    background: #0e0e16;
  }
  .model-name { color: #fff; font-weight: 500; min-width: 100px; }
  .model-stat {
    flex: 1;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
  }
  .model-stat span { color: var(--text); }

  /* Refresh */
  .refresh-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .refresh-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .refresh-btn:hover { opacity: 0.8; }
  .last-updated { font-size: 11px; color: var(--text-dim); }

  .full-width { grid-column: 1 / -1; }
</style>
</head>
<body>

<h1><span>•</span> NPR Local — Dashboard</h1>
<p class="subtitle">System overview & monitoring</p>

<div class="refresh-bar">
  <span class="last-updated" id="lastUpdated">—</span>
  <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
</div>

<!-- Top row: system stats -->
<div class="grid">
  <!-- System -->
  <div class="card">
    <h2>System</h2>
    <div class="stat-row"><span class="stat-label">Uptime</span><span class="stat-value" id="uptime">—</span></div>
    <div class="stat-row"><span class="stat-label">RSS Memory</span><span class="stat-value" id="memory">—</span></div>
    <div class="stat-row"><span class="stat-label">Active Sessions</span><span class="stat-value" id="sessions">—</span></div>
    <div class="stat-row"><span class="stat-label">Total Messages</span><span class="stat-value" id="messages">—</span></div>
  </div>

  <!-- Aggregate Metrics -->
  <div class="card">
    <h2>Metrics</h2>
    <div class="stat-row"><span class="stat-label">Total Requests</span><span class="stat-value" id="totalRequests">—</span></div>
    <div class="stat-row"><span class="stat-label">Total Tokens</span><span class="stat-value" id="totalTokens">—</span></div>
    <div class="stat-row"><span class="stat-label">Avg Latency</span><span class="stat-value" id="avgLatency">—</span></div>
  </div>

  <!-- Token Usage Chart -->
  <div class="card full-width">
    <h2>Token Usage (hourly)</h2>
    <div class="chart-container" id="tokenChart"></div>
  </div>

  <!-- Models -->
  <div class="card">
    <h2>Models</h2>
    <div id="modelList"></div>
  </div>

  <!-- Hex Grid -->
  <div class="card">
    <h2>Hex Grid (0x00–0x3F)</h2>
    <div class="hex-grid" id="hexGrid"></div>
  </div>

  <!-- Active Sessions -->
  <div class="card">
    <h2>Active Sessions</h2>
    <div id="sessionList"></div>
  </div>

  <!-- Tool Calls -->
  <div class="card">
    <h2>Recent Tool Calls</h2>
    <div id="toolCalls"></div>
  </div>
</div>

<script>
const API = '';

async function refresh() {
  try {
    const [data, hexGrid, sessions, tools, metrics] = await Promise.all([
      fetch(API + '/dashboard/data').then(r => r.json()),
      fetch(API + '/dashboard/hex-grid').then(r => r.json()),
      fetch(API + '/dashboard/sessions').then(r => r.json()),
      fetch(API + '/dashboard/tools').then(r => r.json()),
      fetch(API + '/dashboard/metrics/timeseries').then(r => r.json()),
    ]);

    renderSystem(data);
    renderMetrics(data);
    renderModels(data.models);
    renderHexGrid(hexGrid);
    renderSessions(sessions);
    renderToolCalls(tools);
    renderTokenChart(metrics);

    document.getElementById('lastUpdated').textContent =
      `Updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    console.error('[dashboard] refresh failed:', e);
  }
}

function renderSystem(d) {
  document.getElementById('uptime').textContent = d.uptimeFormatted || '—';
  document.getElementById('memory').textContent = formatBytes(d.memory?.rss || 0);
  document.getElementById('sessions').textContent = d.sessions?.active || 0;
  document.getElementById('messages').textContent = d.sessions?.totalMessages || 0;
}

function renderMetrics(d) {
  document.getElementById('totalRequests').textContent = d.totalRequests?.toLocaleString() || 0;
  document.getElementById('totalTokens').textContent = d.totalTokens?.toLocaleString() || 0;
  document.getElementById('avgLatency').textContent =
    d.avgLatencyMs ? `${d.avgLatencyMs}ms` : '—';
}

function renderModels(models) {
  const el = document.getElementById('modelList');
  if (!models?.length) { el.innerHTML = '<div class="session-meta">No models</div>'; return; }
  el.innerHTML = models.map(m => `
    <div class="model-bar">
      <div class="model-name">${m.name}</div>
      <div class="model-stat">
        <div>req: <span>${m.requests || 0}</span></div>
        <div>tok: <span>${(m.totalTokens || 0).toLocaleString()}</span></div>
        <div>lat: <span>${m.avgLatencyMs || 0}ms</span></div>
      </div>
    </div>
  `).join('');
}

function renderHexGrid(d) {
  const el = document.getElementById('hexGrid');
  if (!d?.slots?.length) { el.innerHTML = '—'; return; }
  el.innerHTML = d.slots.map(s => {
    const paths = (s.paths || []).join(', ');
    const title = `${s.hex}${paths ? '\n' + paths : ''}`;
    return `
      <div class="hex-cell${s.registered ? ' registered' : ''} phase-${s.phase}"
           title="${title}">
        ${s.hex.slice(2)}
      </div>
    `;
  }).join('');
}

function renderSessions(d) {
  const el = document.getElementById('sessionList');
  if (!d?.sessions?.length) { el.innerHTML = '<div class="session-meta">No sessions</div>'; return; }
  el.innerHTML = d.sessions.slice(0, 8).map(s => `
    <div class="session-item">
      <div>
        <div class="session-id">${s.id.slice(0, 8)}</div>
        <div class="session-meta">${s.messages} msg${s.model ? ' · ' + s.model : ''}</div>
      </div>
      <div class="session-meta">${formatTimeAgo(s.lastActivity)}</div>
    </div>
  `).join('');
}

function renderToolCalls(d) {
  const el = document.getElementById('toolCalls');
  if (!d?.toolCalls?.length) { el.innerHTML = '<div class="session-meta">No tool calls</div>'; return; }
  el.innerHTML = d.toolCalls.slice(0, 10).map(t => `
    <div class="tool-call">
      <div class="tool-name">${t.tool}</div>
      <div class="tool-args">${JSON.stringify(t.args || {}).slice(0, 60)}…</div>
      <div class="tool-time">${formatTimeAgo(t.time)}</div>
    </div>
  `).join('');
}

function renderTokenChart(d) {
  const el = document.getElementById('tokenChart');
  if (!d?.series?.length) { el.innerHTML = '<div class="session-meta">No data</div>'; return; }
  const maxTokens = Math.max(...d.series.map(s => s.tokens), 1);
  el.innerHTML = d.series.map(s => {
    const h = Math.max(2, (s.tokens / maxTokens) * 100);
    return `
      <div class="chart-bar" style="height:${h}%">
        <div class="tooltip">${s.time.slice(11)} · ${s.tokens} tok · ${s.requests} req</div>
      </div>
    `;
  }).join('');
}

// Utilities
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function formatTimeAgo(ts) {
  if (!ts) return '—';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

// Initial load + auto-refresh every 15s
refresh();
setInterval(refresh, 15000);
</script>
</body>
</html>
